{% extends "base.html" %}

{% block title %}Delete {{ object_type }}{% endblock %}

{% block content %}
<style>
    .delete-card {
        max-width: 500px;
        margin: 2rem auto;
        border: 2px solid #dc3545;
        border-radius: 12px;
        overflow: hidden;
    }

    .delete-card .card-header {
        background: #dc3545;
        color: white;
        padding: 1rem 1.5rem;
    }

    .delete-card .card-header h4 {
        margin: 0;
        font-weight: 700;
    }

    .delete-card .card-body {
        padding: 1.5rem;
        text-align: center;
    }

    .btn-confirm-delete {
        background: #dc3545;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 0.5rem 1.5rem;
        font-weight: 600;
    }

    .btn-confirm-delete:hover {
        background: #c82333;
        color: white;
    }

    .btn-cancel {
        color: #666;
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 0.5rem 1.5rem;
        font-weight: 500;
        text-decoration: none;
    }

    .btn-cancel:hover {
        background: #f8f9fa;
        color: #333;
    }
</style>

<div class="pt-3">
    <div class="delete-card card">
        <div class="card-header">
            <h4>⚠️ Delete {{ object_type }}</h4>
        </div>
        <div class="card-body">
            <p class="mb-3" style="font-size:1.1rem;">
                Are you sure you want to delete <strong>"{{ object }}"</strong>?
            </p>
            <p class="text-muted" style="font-size:0.9rem;">
                This will also delete all associated rules. This action cannot be undone.
            </p>
            <form method="post" class="d-inline">
                {% csrf_token %}
                <a href="{% url cancel_url %}" class="btn btn-cancel me-2">Cancel</a>
                <button type="submit" class="btn btn-confirm-delete">Yes, Delete</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
