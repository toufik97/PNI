{% extends "base.html" %}

{% block content %}
<div class="row pt-3">
    <div class="col-md-8 offset-md-2">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Register New Child</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">National ID / MRN *</label>
                            <input type="text" name="id" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Full Name *</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Sex *</label>
                            <select name="sex" class="form-select" required>
                                <option value="M">Male</option>
                                <option value="F">Female</option>
                                <option value="O">Other</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Date of Birth *</label>
                            <input type="date" name="dob" class="form-control" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Parent/Guardian Name</label>
                        <input type="text" name="parents_name" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Contact Information (Phone)</label>
                        <input type="text" name="contact_info" class="form-control">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Address</label>
                        <textarea name="address" class="form-control" rows="2"></textarea>
                    </div>

                    <div class="text-end">
                        <a href="{% url 'patients:dashboard' %}" class="btn btn-secondary me-2">Cancel</a>
                        <button type="submit" class="btn btn-primary">Register Child</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
